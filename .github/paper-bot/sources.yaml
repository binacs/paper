# paper-bot config.  Source of truth is Semantic Scholar's venue API: each
# `venues:` entry is queried for papers in `since_year` or later, and the
# combined pool is sorted by citation count locally so the highest-impact
# unanalyzed paper bubbles up first ("classics over arXiv firehose").
#
# Tune this file rather than the Python code for routine adjustments;
# changes take effect on the next scheduled or `workflow_dispatch` run.

# Top systems venues, plus the two AI-infra-flavored architecture / ML
# systems conferences.  Each venue has a default `topic` used as a fallback
# when the LLM classifier returns something off-list.
#
# Topic must exist as a top-level directory in this repo; see `topics:` below.
venues:
  - name: OSDI
    topic: orchestration-scheduling
  - name: SOSP
    topic: orchestration-scheduling
  - name: NSDI
    topic: distributed-system
  - name: USENIX ATC
    topic: distributed-system
  - name: EuroSys
    topic: orchestration-scheduling
  - name: SoCC
    topic: orchestration-scheduling
  - name: FAST
    topic: distributed-system
  - name: SIGCOMM
    topic: distributed-system
  - name: MLSys
    topic: gpu-training
  - name: ASPLOS
    topic: gpu-training

# Backstop on how far back to look.  Recommend bumping lower (e.g. 2010) for
# an initial backfill of canonical classics, then ratcheting up later.
since_year: 2018

# Optional hard pre-filter applied before any LLM call.  Venue is already a
# strong relevance signal so this list stays short.
keyword_blocklist:
  - "medical imaging"
  - "image classification"

# Cap analyses per run.  Cost guardrail.
max_candidates_per_run: 8

# Allowed topic slugs the classifier may return.  Each must exist as a
# top-level directory in the repo.
topics:
  - distributed-system
  - orchestration-scheduling
  - gpu-training
  - ai
